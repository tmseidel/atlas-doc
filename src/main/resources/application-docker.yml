spring:
  datasource:
    url: jdbc:h2:file:/app/data/docs-portal
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false

docs-portal:
  workspace-dir: /app/workspace
  mkdocs-config-dir: /app/mkdocs-config
  mkdocs-working-dir: /app/mkdocs-working
  site-dir: /app/site
